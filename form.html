<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscripción - PixelPerfect Studio</title>
  <link rel="stylesheet" href="scss/main.css"> 
</head>
<body>

  <main class="container">
    <section class="card" style="margin-top: 2rem;">
      <a href="index.html" style="color: #F43F5E; text-decoration: none; font-weight: bold;">← Volver al inicio</a>
      <h1 class="card__title">Formulario de Inscripción</h1>
      
      <form action="#" class="main-form">
        <div style="margin-bottom: 1rem; text-align: left;">
          <label style="display: block; font-weight: bold;">Nombre Completo:</label>
          <input type="text" style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid #FEE2E2;">
        </div>
        
        <div style="margin-bottom: 1rem; text-align: left;">
          <label style="display: block; font-weight: bold;">Correo:</label>
          <input type="email" style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid #FEE2E2;">
        </div>

        <div style="margin-bottom: 1rem; text-align: left;">
          <label style="display: block; font-weight: bold;">Comentario (máx 80 palabras):</label>
          <textarea maxlength="400" style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid #FEE2E2;" rows="4"></textarea>
        </div>

        <button type="submit" class="btn btn--primary">Enviar Inscripción</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <img src="assets/traipe_logo16.png" alt="Logo Traipe" class="footer__logo-img">
    <p>Desarrollado con ✨ por Jimena Traipe</p>
    <p>Visita mi web: 
      <a href="http://www.traipe.cl" target="_blank" class="footer__link-neon">www.traipe.cl</a>
    </p>
  </footer>

</body>
</html>
